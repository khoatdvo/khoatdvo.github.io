<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>khoatdvo.github.io</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      min-height: 100vh;
    }
    main {
      margin: auto;
      padding: 2.5rem 1.25rem;
      width: 100%;
      max-width: 720px;
    }
    h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
    p.lead { margin: 0 0 2rem; color: #8b949e; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: 0; }
    a.file {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .75rem 1rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: .5rem;
      color: #58a6ff;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    a.file:hover { background: #161b22; border-color: #58a6ff; }
    a.file::before { content: "📄"; }
    a.dir::before { content: "📁"; }
    a.zip::before { content: "📦"; }
    span.size { margin-left: auto; color: #6e7681; font-size: .8rem; font-variant-numeric: tabular-nums; }
    h2 { font-size: 1.1rem; margin: 2rem 0 .5rem; }
    footer { margin-top: 2.5rem; color: #6e7681; font-size: .85rem; }
    footer a { color: #6e7681; }
  </style>
</head>
<body>
  <main>
    <h1>khoatdvo.github.io</h1>
    <p class="lead">Files served via GitHub Pages.</p>

    <h2>Files</h2>
    <ul>
      <li><a class="file" href="files/sample.txt">files/sample.txt<span class="size">148 B</span></a></li>
    </ul>

    <footer>
      Add files under <code>files/</code> and link them above, or reference them
      directly by URL. Hosted on
      <a href="https://pages.github.com/">GitHub Pages</a>.
    </footer>
  </main>
</body>
</html>
